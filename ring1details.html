<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitaire Grace | SOHEB_.X</title>
    <style>
        @font-face{ font-family:'Chopsic'; src:url('Chopsic.otf') format('opentype'); }
        body { background: url('ring1dpbg.png') no-repeat center center fixed; background-size: cover; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; background: rgba(0,0,0,0.8); min-height: 100vh; }
        .brand-top { font-family: 'Chopsic'; font-size: 24px; color: #D4AF37; margin-bottom: 30px; letter-spacing: 4px; }
        
        /* Layout */
        .product-main { display: flex; gap: 40px; margin-bottom: 60px; }
        .thumbnails { display: flex; flex-direction: column; gap: 15px; }
        .thumb { width: 80px; height: 80px; border: 1px solid #333; cursor: pointer; border-radius: 8px; object-fit: cover; transition: 0.3s; }
        .thumb:hover { border-color: #D4AF37; transform: scale(1.05); }
        .main-img { flex: 1; border-radius: 20px; border: 1px solid #D4AF37; width: 100%; max-height: 500px; object-fit: cover; cursor: pointer; }
        
        .info h1 { font-size: 48px; color: #D4AF37; margin: 0; }
        .btn { display: inline-block; padding: 15px 30px; border: 1px solid #D4AF37; color: #D4AF37; text-decoration: none; margin-top: 20px; border-radius: 30px; transition: 0.4s; }
        .btn:hover { background: #D4AF37; color: #000; box-shadow: 0 0 20px #D4AF37; }

        /* Grid */
        .cad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 50px; }
        .cad-box { border: 1px solid #333; padding: 15px; text-align: center; border-radius: 15px; background: rgba(255,255,255,0.05); }
        .cad-box img { width: 100%; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .cad-box img:hover { transform: scale(1.05); box-shadow: 0 0 15px #D4AF37; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { border: 1px solid #333; padding: 20px; text-align: center; border-radius: 15px; background: rgba(255,255,255,0.05); }
        .stat-card h4 { color: #D4AF37; margin-bottom: 5px; font-size: 12px; }

        /* Footer */
        .footer-brand { font-family: 'Chopsic'; font-size: 32px; color: #D4AF37; text-align: center; margin-top: 50px; padding-bottom: 20px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-top"><a href="ring.html" style="text-decoration: none; color: inherit;">SOHEB_.X</a></div>
    
    <div class="product-main">
        <div class="thumbnails">
            <img src="render1.jpg" class="thumb" onclick="document.getElementById('mainImg').src=this.src">
            <img src="render2.jpg" class="thumb" onclick="document.getElementById('mainImg').src=this.src">
            <img src="render3.jpg" class="thumb" onclick="document.getElementById('mainImg').src=this.src">
        </div>
        <img src="render1.jpg" id="mainImg" class="main-img" onclick="openLightbox(this.src)">
        <div class="info">
            <h1>SOLITAIRE GRACE</h1>
            <p>18K YELLOW GOLD</p>
            <p>A timeless solitaire ring that defines elegance and sophistication.</p>
            <a href="https://wa.me/919883452853?text=I am interested in Solitaire Grace ring" target="_blank" class="btn">REQUEST THIS DESIGN</a>
        </div>
    </div>

    <h3 style="margin-bottom:30px;">RING DETAILS</h3>
    <div class="stats-grid">
        <div class="stat-card"><h4>RING SIZE</h4><p>US 7.00</p></div>
        <div class="stat-card"><h4>METAL</h4><p>18K YELLOW GOLD</p></div>
        <div class="stat-card"><h4>TOTAL STONE</h4><p>1</p></div>
        <div class="stat-card"><h4>SETTING TYPE</h4><p>PRONG SET</p></div>
    </div>

    <h3 style="color:#D4AF37; margin-bottom:30px;">MATRIX (CAD) VIEWS</h3>
    <div class="cad-grid">
        <div class="cad-box"><img src="matrix1.jpg" onclick="openLightbox(this.src)"><p>TOP</p></div>
        <div class="cad-box"><img src="matrix2.jpg" onclick="openLightbox(this.src)"><p>FRONT</p></div>
        <div class="cad-box"><img src="matrix3.jpg" onclick="openLightbox(this.src)"><p>SIDE</p></div>
        <div class="cad-box"><img src="matrix4.jpg" onclick="openLightbox(this.src)"><p>PERSPECTIVE</p></div>
    </div>

    <div class="footer-brand">SOHEB_.X</div>
</div>

<!-- Lightbox Modal -->
<div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:9999;" onclick="this.style.display='none'">
    <img id="lightbox-img" style="max-width:90%; max-height:90%; border-radius:15px; border:2px solid #D4AF37; box-shadow: 0 0 30px #D4AF37;">
</div>

<script>
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
</script>

</body>
</html>
