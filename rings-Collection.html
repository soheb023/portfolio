<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rings Collection | SOHEB_.X</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #070707; --gold: #D4AF37; --text: #ffffff; --card-bg: #111111; --border: #222222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Header Section */
        header { text-align: center; margin-bottom: 60px; }
        .title { font-family: 'Cinzel', serif; font-size: 80px; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; }
        .subtitle { color: var(--gold); letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }

        /* Grid Section */
        .ring-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .card-number { color: var(--text); font-size: 16px; margin-bottom: 15px; }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 20px; }
        .card h3 { color: var(--text); font-family: 'Cinzel', serif; margin: 0; }
        .card p { color: var(--gold); font-size: 12px; margin-top: 5px; letter-spacing: 1px; }
        .arrow { position: absolute; top: 25px; right: 25px; color: var(--gold); }

        /* Pagination */
        .pagination { text-align: center; margin-top: 40px; }
        .pagination a { color: var(--text); padding: 10px 15px; border: 1px solid var(--border); text-decoration: none; margin: 0 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="subtitle">EXPLORE OUR COLLECTION OF</div>
        <div class="title">RINGS</div>
        <div class="subtitle">HANDCRAFTED CAD DESIGNS</div>
    </header>

    <div class="ring-grid">
        <!-- কার্ড ১ -->
        <div class="card">
            <div class="card-number">01 <span class="arrow">↗️</span></div>
            <img src="ring1.jpg" alt="Solitaire Grace">
            <h3>Solitaire Grace</h3>
            <p>18K YELLOW GOLD</p>
        </div>
        <!-- কার্ড ২ -->
        <div class="card">
            <div class="card-number">02 <span class="arrow">↗️</span></div>
            <img src="ring2.jpg" alt="Halo Radiance">
            <h3>Halo Radiance</h3>
            <p>18K ROSE GOLD</p>
        </div>
        <!-- কার্ড ৩ -->
        <div class="card">
            <div class="card-number">03 <span class="arrow">↗️</span></div>
            <img src="ring3.jpg" alt="Regal Vision">
            <h3>Regal Vision</h3>
            <p>18K YELLOW GOLD</p>
        </div>
        <!-- এভাবে আরও কার্ড যোগ করুন -->
    </div>

    <div class="pagination">
        <a href="#">←</a><a href="#">1</a><a href="#">2</a><span>...</span><a href="#">5</a><a href="#">→</a>
    </div>
</div>

</body>
</html>
