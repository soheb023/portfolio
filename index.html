<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOHEB_.X | Jewelry CAD Artist</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Montserrat:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

@font-face{
    font-family:'Chopsic';
    src:url('Chopsic.otf') format('opentype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    padding:20px;
}

.container{
    max-width:800px;
}

h1{
    font-family:'Chopsic', sans-serif;
    font-size:42px;
    letter-spacing:6px;
    color:#D4AF37;
    margin-bottom:18px;
}

h2{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:30px;
    font-weight:500;
    color:#ffffff;
    margin-bottom:18px;
}

p{
    font-family:'Playfair Display', serif;
    font-size:18px;
    color:#cfcfcf;
    letter-spacing:1px;
    margin-bottom:45px;
}

button{
    font-family:'Montserrat', sans-serif;
    font-size:16px;
    font-weight:600;
    color:#D4AF37;
    background:transparent;
    border:1.5px solid #D4AF37;
    border-radius:6px;
    padding:15px 42px;
    cursor:pointer;
    transition:all .35s ease;
}

button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(212,175,55,.35);
}

@media (max-width:768px){

h1{
    font-size:34px;
    letter-spacing:4px;
}

h2{
    font-size:24px;
}

p{
    font-size:16px;
}

button{
    width:100%;
    max-width:260px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>SOHEB_.X</h1>

<h2>Jewelry CAD Artist</h2>

<p>From Vision To Reality</p>

<button>Explore Portfolio</button>

</div>

</body>
</html>
