<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOHEB_.X | Jewelry CAD Artist</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Montserrat:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

@font-face{
    font-family:'Chopsic';
    src:url('Chopsic.otf') format('opentype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    color:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    padding:20px;
}

.container{
    max-width:800px;
}

h1{
    font-family:'Chopsic', sans-serif;
    font-size:clamp(38px,6vw,52px);
    letter-spacing:8px;
    color:#D4AF37;
    margin-bottom:18px;
}

h2{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(24px,3vw,34px);
    font-weight:500;
    color:#ffffff;
    margin-bottom:18px;
}

p{
    font-family:'Playfair Display', serif;
    font-size:clamp(17px,2vw,22px);
    color:#cfcfcf;
    letter-spacing:1px;
    margin-bottom:45px;
}

button{
    font-family:'Montserrat', sans-serif;
    font-size:16px;
    font-weight:600;
    color:#D4AF37;
    background:transparent;
    border:1.5px solid #D4AF37;
    border-radius:50px;
    padding:16px 42px;
    cursor:pointer;
    transition:all .4s ease;
}

button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(212,175,55,.35);
}


.logo-box{width:120px;height:120px;margin:0 auto 30px;display:flex;justify-content:center;align-items:center;transform:rotate(45deg);border:2px solid #D4AF37;box-shadow:0 0 20px rgba(212,175,55,.5);animation:g 2.5s infinite}
.logo-box img{width:95px;transform:rotate(-45deg);filter:drop-shadow(0 0 10px rgba(212,175,55,.8))}
@keyframes g{50%{box-shadow:0 0 35px rgba(255,215,0,.9)}}

</style>

</head>

<body>

<div class="container">
<div class="logo-box"><img src="logo_transparent.png" alt="logo"></div>

    <h1>SOHEB_.X</h1>

    <h2>Jewelry CAD Artist</h2>

    <p>From Vision To Reality</p>

    <button>Explore Portfolio</button>

</div>

</body>
</html>
