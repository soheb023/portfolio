<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOHEB_.X | Jewelry CAD Artist</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Montserrat:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

@font-face{
    font-family:'Chopsic';
    src:url('Chopsic.otf') format('opentype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    padding:20px;
}

.container{
    max-width:800px;
}

h1{
    font-family:'Chopsic', sans-serif;
    font-size:42px;
    letter-spacing:6px;
    color:#D4AF37;
    margin-bottom:15px;
}

/* GOLD LINE */

.gold-line{
    width:80%;
    max-width:220px;
    height:2px;
    margin:0 auto 30px;
    background:linear-gradient(90deg,#b8860b,#FFD700,#FFF2A8,#FFD700,#b8860b);
    border-radius:2px;
    opacity:0;
    animation:goldBeam 2.8s ease forwards;
}

@keyframes goldBeam{

0%{
    opacity:0;
    transform:scaleX(1);
    filter:brightness(1);
    box-shadow:
        0 0 0 rgba(255,215,0,0),
        0 0 0 rgba(255,242,168,0);
}

15%{
    opacity:1;
}

40%{
    opacity:1;
    filter:brightness(2.5);
    box-shadow:
        0 0 12px rgba(255,215,0,.95),
        0 0 28px rgba(255,215,0,.9),
        0 0 55px rgba(255,242,168,.8),
        0 0 90px rgba(255,242,168,.5);
}

65%{
    opacity:1;
    filter:brightness(2);
    box-shadow:
        0 0 18px rgba(255,215,0,.8),
        0 0 40px rgba(255,242,168,.7);
}

100%{
    opacity:0;
    filter:brightness(1);
    box-shadow:none;
}
}
p{
    font-family:'Playfair Display', serif;
    font-size:18px;
    color:#cfcfcf;
    letter-spacing:1px;
    margin-bottom:45px;
}

button{
    font-family:'Montserrat', sans-serif;
    font-size:16px;
    font-weight:600;
    color:#D4AF37;
    background:transparent;
    border:1.5px solid #D4AF37;
    border-radius:6px;
    padding:15px 42px;
    cursor:pointer;
    transition:.35s;
}

button:hover{
    background:#D4AF37;
    color:#000;
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(212,175,55,.35);
}

@media(max-width:768px){

h1{
    font-size:34px;
    letter-spacing:4px;
}

.gold-line{
    width:140px;
}

h2{
    font-size:24px;
}

p{
    font-size:16px;
}

button{
    width:100%;
    max-width:260px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>SOHEB_.X</h1>

<div class="gold-line"></div>

<h2>Jewelry CAD Artist</h2>

<p>From Vision To Reality</p>

<button>Explore Portfolio</button>

</div>

</body>
</html>
