<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHEB_.X | Solitaire Grace</title>
    <style>
        body { background: #090909; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        .product-showcase { display: flex; padding: 80px 8%; align-items: center; justify-content: space-between; gap: 40px; }
        
        /* মেইন ছবি ছোট করার জন্য */
        .gallery-col { flex: 0 0 40%; }
        .main-img-box img { max-width: 80%; border-radius: 15px; } 
        
        .info-col { flex: 1; max-width: 500px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 48px; color: #fff; margin-bottom: 10px; }
        .sub-title { color: #D4AF37; letter-spacing: 4px; font-size: 12px; }
        .metal { color: #D4AF37; margin-bottom: 20px; }
        
        .btn-primary { 
            padding: 15px 40px; background: transparent; border: 1px solid #D4AF37; 
            color: #D4AF37; cursor: pointer; transition: 0.3s; 
        }
        .btn-primary:hover { background: #D4AF37; color: #000; }

        /* ডিটেইলস সেকশন - সহজেই এডিট করার জন্য */
        .details-section { padding: 0 8% 80px; }
        .details-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px; }
        .details-card { background: #111; border: 1px solid rgba(212,175,55,0.2); padding: 20px; text-align: center; }
        .details-card h4 { color: #D4AF37; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <section class="product-showcase">
        <div class="gallery-col">
            <div class="main-img-box"><img src="ring-render.jpg" alt="Ring"></div>
        </div>
        
        <div class="info-col">
            <p class="sub-title">01 / 10</p>
            <h1>SOLITAIRE GRACE</h1>
            <p class="metal">18K YELLOW GOLD</p>
            <p class="desc">A timeless solitaire ring that defines elegance and sophistication.</p>
            <div class="action-btns" style="margin-top: 30px;">
                <button class="btn-primary">REQUEST THIS DESIGN</button>
            </div>
        </div>
    </section>

    <!-- ডিটেইলস সেকশন: এখান থেকে সহজেই যেকোনো সংখ্যা বা টেক্সট এডিট করতে পারবে -->
    <section class="details-section">
        <h3>RING DETAILS</h3>
        <div class="details-grid">
            <div class="details-card"><h4>RING SIZE</h4><p>US 7.00</p></div>
            <div class="details-card"><h4>METAL</h4><p>18K GOLD</p></div>
            <div class="details-card"><h4>TOTAL STONE</h4><p>1</p></div> 
            <div class="details-card"><h4>SETTING</h4><p>PRONG</p></div>
        </div>
    </section>

</body>
</html>
