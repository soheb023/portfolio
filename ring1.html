<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHEB_.X | Solitaire Grace</title>
    <style>
        /* আপনার বর্তমান ডার্ক থিম স্টাইলিং এখানে যুক্ত করুন */
        body { background: #090909; color: #fff; font-family: 'Montserrat', sans-serif; }
        
        .product-showcase { display: flex; padding: 100px 8%; align-items: center; justify-content: space-between; }
        .info-col { max-width: 500px; }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 48px; color: #fff; margin-bottom: 10px; }
        .sub-title { color: #D4AF37; letter-spacing: 4px; font-size: 12px; }
        .metal { color: #D4AF37; margin-bottom: 20px; }
        
        .btn-primary { 
            padding: 15px 40px; 
            background: transparent; 
            border: 1px solid #D4AF37; 
            color: #D4AF37; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-primary:hover { background: #D4AF37; color: #000; }

        .cad-section { padding: 0 8% 80px; }
        .cad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px; }
        .cad-card { background: #111; border: 1px solid rgba(212,175,55,0.2); padding: 20px; text-align: center; color: #D4AF37; }
    </style>
</head>
<body>

    <!-- PRODUCT SHOWCASE SECTION -->
    <section class="product-showcase">
        <div class="gallery-col">
            <!-- মেইন রিং ইমেজ -->
            <div class="main-img-box"><img src="ring-render.jpg" alt="Ring" style="max-width: 100%;"></div>
        </div>
        
        <div class="info-col">
            <p class="sub-title">01 / 10</p>
            <h1>SOLITAIRE GRACE</h1>
            <p class="metal">18K YELLOW GOLD</p>
            <p class="desc">A timeless solitaire ring that defines elegance and sophistication.</p>
            
            <div class="action-btns" style="margin-top: 30px;">
                <button class="btn-primary">REQUEST THIS DESIGN</button>
                <!-- DOWNLOAD CAD FILE বাটনটি এখানে রিমুভ করা হয়েছে -->
            </div>
        </div>
    </section>

    <!-- CAD VIEW SECTION -->
    <section class="cad-section">
        <h3>CAD (RHINO/MATRIX) VIEWS</h3>
        <div class="cad-grid">
            <div class="cad-card">TOP VIEW</div>
            <div class="cad-card">FRONT VIEW</div>
            <div class="cad-card">SIDE VIEW</div>
            <div class="cad-card">PERSPECTIVE</div>
        </div>
    </section>

</body>
</html>
