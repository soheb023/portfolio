}

nav{

display:flex;
gap:38px;

}

nav a{

color:#d9d9d9;

font-size:14px;

letter-spacing:2px;

transition:.35s;

}

nav a:hover{

color:#D4AF37;

}

.active{

color:#D4AF37;

}

.contact-btn{

padding:13px 28px;

border:1px solid #D4AF37;

border-radius:40px;

transition:.35s;

}

.contact-btn:hover{

background:#D4AF37;

color:#000;

box-shadow:0 0 20px rgba(212,175,55,.35);

}

@media(max-width:900px){

nav{

display:none;

}

.logo{

font-size:26px;

letter-spacing:4px;

}

.contact-btn{

padding:10px 18px;

font-size:13px;

}

}


/* HERO */
.hero{min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:140px 8% 80px;background:linear-gradient(rgba(8,8,8,.72),rgba(8,8,8,.82)),url("black-silk.jpg.png");background-size:cover;background-position:center;background-repeat:no-repeat;}
.hero-content{max-width:850px;width:100%;margin:auto;}
.hero-subtitle{color:#D4AF37;letter-spacing:8px;font-size:14px;margin-bottom:25px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(42px,8vw,72px);letter-spacing:8px;margin-bottom:20px;}
.hero h2{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,4vw,40px);font-weight:500;line-height:1.2;margin-bottom:30px;}
.hero-text{color:#bfbfbf;font-size:clamp(15px,2vw,17px);line-height:1.8;max-width:650px;margin:0 auto 45px;}
.hero-btn{display:inline-block;padding:16px 42px;border:1px solid #D4AF37;border-radius:40px;color:#D4AF37;text-decoration:none;transition:.4s;}
.hero-btn:hover{background:#D4AF37;color:#000;}
@media(max-width:900px){.hero h1{font-size:48px;letter-spacing:6px}.hero h2{font-size:28px}}


.luxury-divider{display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0 28px;color:#D4AF37;font-size:16px}
.luxury-divider span{display:block;width:90px;height:1px;background:#D4AF37;opacity:.45}
.hero h1{color:#fff;text-shadow:0 0 8px rgba(212,175,55,.12),0 0 18px rgba(212,175,55,.08),0 0 30px rgba(212,175,55,.05);}
.hero-btn{position:relative;overflow:hidden}
.hero-btn::before{content:'';position:absolute;top:0;left:-120%;width:70%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transition:.7s}
.hero-btn:hover::before{left:130%}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 0 25px rgba(212,175,55,.35);}
